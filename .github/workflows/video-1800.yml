name: Auto Video 1800 IST
on:
  schedule:
    - cron: '30 12 * * *'   # 1800 IST daily
  workflow_dispatch: {}
concurrency:
  group: video-pipeline
  cancel-in-progress: false
jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 320
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install ffmpeg + Hindi fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-core fonts-indic
      - name: Get Hindi (Devanagari) font for thumbnails/reels
        run: |
          mkdir -p assets/fonts
          curl -fsSL -o assets/fonts/NotoSansDevanagari-Bold.ttf \
            https://github.com/googlefonts/noto-fonts/raw/main/hinted/ttf/NotoSansDevanagari/NotoSansDevanagari-Bold.ttf || echo "font dl skipped"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python src/orchestrator.py
      - name: Commit ledger + queued reels
        run: |
          git config user.name "itihaas-bot"
          git config user.email "bot@users.noreply.github.com"
          find reels_to_post -type f -mtime +7 -delete 2>/dev/null || true
          git add data/used_topics.json data/topic_pool.json reels_to_post || true
          git commit -m "run: $(date -u +%F-%T)" || echo "nothing to commit"
          git push || echo "push skipped"
